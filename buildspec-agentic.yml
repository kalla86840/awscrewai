version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-west-1
    AWS_REGION: us-west-1
    PROJECT_NAME: aws-autogen-open-ai-pincone
    ARTIFACT_BUCKET: mlopswithsagemaker111
    OPENAI_MODEL: gpt-5.2
    OPENAI_API_KEY_SECRET_ARN: arn:aws:secretsmanager:us-west-1:659613508664:secret:openai/api-key-6BGXhJ
    PINECONE_API_KEY_SECRET_ARN: ""
    PINECONE_INDEX_NAME: agentic-hospital-rag-1024
    PINECONE_INDEX_HOST: ""
    PINECONE_NAMESPACE: hospital-agentic
    PINECONE_DIMENSION: "1024"
    PINECONE_CLOUD: aws
    PINECONE_REGION: us-east-1
    PINECONE_UPSERT_ON_QUERY: "true"

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - python -m pip install --upgrade pip
  pre_build:
    commands:
      - python scripts/validate_aws_agentic_pipeline.py
      - test -n "${ECR_REPOSITORY_URI}" || (echo "ECR_REPOSITORY_URI must be set by the CodePipeline stack" && exit 1)
      - AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
      - IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}"
      - IMAGE_TAG="$(printf '%s' "${IMAGE_TAG}" | cut -c1-12)"
      - IMAGE_URI="${ECR_REPOSITORY_URI}:${IMAGE_TAG}"
      - aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
  build:
    commands:
      - rm -rf build dist
      - mkdir -p build dist
      - docker build -t "${IMAGE_URI}" agentic_endpoint
      - docker push "${IMAGE_URI}"
      - echo "${IMAGE_URI}" | tee dist/agentic-endpoint-image-uri.txt
      - |
        set -- \
          ProjectName="${PROJECT_NAME}" \
          ImageUri="${IMAGE_URI}" \
          OpenAIApiKeySecretArn="${OPENAI_API_KEY_SECRET_ARN}" \
          OpenAIModel="${OPENAI_MODEL}"
        if [ -n "${PINECONE_API_KEY_SECRET_ARN}" ]; then
          set -- "$@" \
            PineconeApiKeySecretArn="${PINECONE_API_KEY_SECRET_ARN}" \
            PineconeIndexName="${PINECONE_INDEX_NAME}" \
            PineconeNamespace="${PINECONE_NAMESPACE}" \
            PineconeDimension="${PINECONE_DIMENSION}" \
            PineconeCloud="${PINECONE_CLOUD}" \
            PineconeRegion="${PINECONE_REGION}" \
            PineconeUpsertOnQuery="${PINECONE_UPSERT_ON_QUERY}"
          if [ -n "${PINECONE_INDEX_HOST}" ]; then
            set -- "$@" PineconeIndexHost="${PINECONE_INDEX_HOST}"
          fi
        fi
        aws cloudformation deploy \
          --template-file infrastructure/agentic-endpoint.yaml \
          --stack-name "${PROJECT_NAME}-agentic-endpoint" \
          --capabilities CAPABILITY_NAMED_IAM \
          --no-fail-on-empty-changeset \
          --parameter-overrides "$@"
      - ENDPOINT_URL="$(aws cloudformation describe-stacks --stack-name "${PROJECT_NAME}-agentic-endpoint" --query "Stacks[0].Outputs[?OutputKey=='AgenticFunctionUrl'].OutputValue" --output text)"
      - echo "${ENDPOINT_URL}" | tee dist/agentic-endpoint-url.txt
      - printf '{"endpoint_url":"%s","agents":["agent_1:hospital","agent_2:doctor","agent_3:nurse"],"orchestrator":"crewai","model":"%s","aws_service":"lambda-function-url"}\n' "${ENDPOINT_URL}" "${OPENAI_MODEL}" | tee dist/agentic-endpoint-metadata.json
      - python -c "import json; body=json.load(open('samples/agentic_hospital_request.json')); body['dry_run']=True; json.dump(body, open('dist/agentic-smoke-request.json','w'))"
      - aws lambda invoke --function-name "${PROJECT_NAME}-crewai-endpoint" --payload fileb://dist/agentic-smoke-request.json dist/agentic-sample-response.json
      - python -c "import json; body=json.load(open('dist/agentic-sample-response.json')); assert body.get('statusCode') == 200, body; print('Agentic RAG endpoint smoke test passed')"

artifacts:
  files:
    - dist/agentic-endpoint-image-uri.txt
    - dist/agentic-endpoint-url.txt
    - dist/agentic-endpoint-metadata.json
    - dist/agentic-smoke-request.json
    - dist/agentic-sample-response.json
