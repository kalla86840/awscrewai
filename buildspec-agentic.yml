version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-west-1
    AWS_REGION: us-west-1
    PROJECT_NAME: aws-open-ai-autogen
    ARTIFACT_BUCKET: mlopswithsagemaker111
    OPENAI_MODEL: gpt-5.2
    OPENAI_API_KEY_SECRET_ARN: arn:aws:secretsmanager:us-west-1:659613508664:secret:openai/api-key-6BGXhJ

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - python -m pip install --upgrade pip
  pre_build:
    commands:
      - python scripts/validate_aws_agentic_pipeline.py
      - test -n "${ECR_REPOSITORY_URI}" || (echo "ECR_REPOSITORY_URI must be set by the CodePipeline stack" && exit 1)
      - AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
      - IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}"
      - IMAGE_TAG="$(printf '%s' "${IMAGE_TAG}" | cut -c1-12)"
      - IMAGE_URI="${ECR_REPOSITORY_URI}:${IMAGE_TAG}"
      - aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
  build:
    commands:
      - rm -rf build dist
      - mkdir -p build dist
      - docker build -t "${IMAGE_URI}" agentic_endpoint
      - docker push "${IMAGE_URI}"
      - echo "${IMAGE_URI}" | tee dist/agentic-endpoint-image-uri.txt
      - |
        ENDPOINT_STACK="${PROJECT_NAME}-endpoint"
        STACK_STATUS="$(aws cloudformation describe-stacks --stack-name "${ENDPOINT_STACK}" --query 'Stacks[0].StackStatus' --output text 2>/dev/null || true)"
        case "${STACK_STATUS}" in
          ROLLBACK_COMPLETE|ROLLBACK_FAILED|CREATE_FAILED|DELETE_FAILED|UPDATE_ROLLBACK_FAILED)
            echo "Deleting stuck endpoint stack ${ENDPOINT_STACK} with status ${STACK_STATUS}"
            aws cloudformation delete-stack --stack-name "${ENDPOINT_STACK}"
            for attempt in $(seq 1 30); do
              STACK_STATUS="$(aws cloudformation describe-stacks --stack-name "${ENDPOINT_STACK}" --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo DELETE_COMPLETE)"
              if [ "${STACK_STATUS}" = "DELETE_COMPLETE" ]; then
                break
              fi
              echo "Waiting for ${ENDPOINT_STACK} deletion, status ${STACK_STATUS}, attempt ${attempt}/30"
              sleep 30
            done
            if [ "${STACK_STATUS}" != "DELETE_COMPLETE" ]; then
              aws cloudformation describe-stack-events --stack-name "${ENDPOINT_STACK}" --max-items 20 --query "StackEvents[].[Timestamp,LogicalResourceId,ResourceStatus,ResourceStatusReason]" --output table
              exit 1
            fi
            ;;
        esac
      - aws cloudformation deploy --template-file infrastructure/agentic-endpoint.yaml --stack-name "${PROJECT_NAME}-endpoint" --capabilities CAPABILITY_NAMED_IAM --no-fail-on-empty-changeset --parameter-overrides ProjectName="${PROJECT_NAME}" ImageUri="${IMAGE_URI}" OpenAIApiKeySecretArn="${OPENAI_API_KEY_SECRET_ARN}" OpenAIModel="${OPENAI_MODEL}" || (aws cloudformation describe-stack-events --stack-name "${PROJECT_NAME}-endpoint" --max-items 20 --query "StackEvents[].[Timestamp,LogicalResourceId,ResourceStatus,ResourceStatusReason]" --output table; exit 1)
      - ENDPOINT_URL="$(aws cloudformation describe-stacks --stack-name "${PROJECT_NAME}-endpoint" --query "Stacks[0].Outputs[?OutputKey=='AgenticFunctionUrl'].OutputValue" --output text)"
      - echo "${ENDPOINT_URL}" | tee dist/agentic-endpoint-url.txt
      - printf '{"endpoint_url":"%s","agents":["agent_1:hospital","agent_2:doctor","agent_3:nurse"],"orchestrator":"crewai","model":"%s","aws_service":"lambda-function-url"}\n' "${ENDPOINT_URL}" "${OPENAI_MODEL}" | tee dist/agentic-endpoint-metadata.json
      - python -c "import json; body=json.load(open('samples/agentic_hospital_request.json')); body['dry_run']=True; json.dump(body, open('dist/agentic-smoke-request.json','w'))"
      - aws lambda invoke --function-name "${PROJECT_NAME}" --payload fileb://dist/agentic-smoke-request.json dist/agentic-sample-response.json
      - python -c "import json; body=json.load(open('dist/agentic-sample-response.json')); assert body.get('statusCode') == 200, body; print('Agentic RAG endpoint smoke test passed')"

artifacts:
  files:
    - dist/agentic-endpoint-image-uri.txt
    - dist/agentic-endpoint-url.txt
    - dist/agentic-endpoint-metadata.json
    - dist/agentic-smoke-request.json
    - dist/agentic-sample-response.json
