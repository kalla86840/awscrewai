<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pinecone Support Assistant</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7f8;
      color: #172126;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #f5f7f8; }
    button, textarea { font: inherit; }
    .app { display: grid; grid-template-rows: auto 1fr auto; min-height: 100vh; }
    header {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 14px 20px; border-bottom: 1px solid #d9e0e3; background: #fff;
    }
    .brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .mark {
      display: grid; place-items: center; width: 34px; height: 34px;
      border-radius: 7px; background: #0e675c; color: #fff; font-weight: 750;
    }
    h1 { margin: 0; font-size: 16px; font-weight: 720; }
    .subtitle { margin-top: 2px; color: #647178; font-size: 12px; }
    .status { display: flex; align-items: center; gap: 7px; color: #536168; font-size: 12px; white-space: nowrap; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #1c9b72; }
    main { width: min(860px, 100%); margin: 0 auto; padding: 28px 18px 140px; }
    .messages { display: flex; flex-direction: column; gap: 18px; }
    .message { display: flex; gap: 10px; align-items: flex-start; }
    .message.user { justify-content: flex-end; }
    .avatar {
      display: grid; place-items: center; flex: 0 0 auto; width: 28px; height: 28px;
      border-radius: 6px; background: #0e675c; color: #fff; font-size: 12px; font-weight: 750;
    }
    .bubble {
      max-width: min(690px, calc(100vw - 94px)); padding: 12px 14px; border: 1px solid #d9e0e3;
      border-radius: 7px; background: #fff; color: #26343a; font-size: 14px; line-height: 1.55;
      white-space: pre-wrap;
    }
    .user .bubble { border-color: #c8dbd8; background: #e7f3f1; }
    .meta { margin-top: 9px; color: #647178; font-size: 11px; }
    .citations { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .citation { padding: 3px 6px; border: 1px solid #cbd7da; border-radius: 4px; color: #536168; font-size: 11px; }
    .composer-wrap {
      position: fixed; right: 0; bottom: 0; left: 0; padding: 14px 18px 18px;
      border-top: 1px solid #d9e0e3; background: rgba(255, 255, 255, .96);
    }
    form {
      display: grid; grid-template-columns: 1fr 42px; gap: 8px; width: min(860px, 100%); margin: 0 auto;
    }
    textarea {
      width: 100%; min-height: 46px; max-height: 140px; resize: none; padding: 12px 13px;
      border: 1px solid #bfcbd0; border-radius: 7px; outline: none; color: #172126; background: #fff;
    }
    textarea:focus { border-color: #0e675c; box-shadow: 0 0 0 3px rgba(14, 103, 92, .12); }
    button {
      display: grid; place-items: center; width: 42px; height: 42px; align-self: end;
      border: 0; border-radius: 7px; background: #0e675c; color: #fff; cursor: pointer;
      font-size: 20px; line-height: 1;
    }
    button:hover { background: #0a554c; }
    button:disabled { background: #a6b8b6; cursor: wait; }
    .composer-note { width: min(860px, 100%); margin: 7px auto 0; color: #728087; font-size: 11px; }
    @media (max-width: 560px) {
      header { padding: 12px 14px; }
      main { padding: 20px 12px 128px; }
      .composer-wrap { padding: 10px 12px 14px; }
      .subtitle { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="mark">P</div>
        <div>
          <h1>Pinecone Support Assistant</h1>
          <div class="subtitle">Grounded answers from your indexed knowledge</div>
        </div>
      </div>
      <div class="status"><span class="status-dot"></span><span>Pinecone RAG</span></div>
    </header>
    <main>
      <section id="messages" class="messages" aria-live="polite">
        <article class="message assistant">
          <div class="avatar">AI</div>
          <div class="bubble">How can I help today?</div>
        </article>
      </section>
    </main>
    <div class="composer-wrap">
      <form id="chat-form">
        <textarea id="question" rows="1" placeholder="Message the assistant" aria-label="Message the assistant" required></textarea>
        <button id="send" type="submit" title="Send message" aria-label="Send message">&#8593;</button>
      </form>
      <div class="composer-note">Answers are grounded in retrieved Pinecone context.</div>
    </div>
  </div>
  <script>
    const form = document.getElementById("chat-form");
    const question = document.getElementById("question");
    const send = document.getElementById("send");
    const messages = document.getElementById("messages");
    const conversationId = crypto.randomUUID ? crypto.randomUUID() : `chat-${Date.now()}`;

    function addMessage(role, text, data = {}) {
      const article = document.createElement("article");
      article.className = `message ${role}`;
      if (role === "assistant") {
        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = "AI";
        article.appendChild(avatar);
      }
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      if (data.retrieval_source) {
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = `Retrieved with ${data.retrieval_source}`;
        bubble.appendChild(meta);
      }
      if (data.citations && data.citations.length) {
        const citations = document.createElement("div");
        citations.className = "citations";
        data.citations.forEach(({ title }) => {
          const citation = document.createElement("span");
          citation.className = "citation";
          citation.textContent = title;
          citations.appendChild(citation);
        });
        bubble.appendChild(citations);
      }
      article.appendChild(bubble);
      messages.appendChild(article);
      article.scrollIntoView({ behavior: "smooth", block: "end" });
      return bubble;
    }

    async function ask(text) {
      addMessage("user", text);
      const pending = addMessage("assistant", "Searching indexed context...");
      send.disabled = true;
      try {
        const result = await fetch(window.location.href, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            mode: "chatbot_rag",
            conversation_id: conversationId,
            assistant_id: "support-assistant",
            question: text,
            top_k: 5
          })
        });
        const data = await result.json();
        pending.parentElement.remove();
        if (!result.ok || data.error) throw new Error(data.error || `Request failed (${result.status})`);
        addMessage("assistant", data.answer, data);
      } catch (error) {
        pending.textContent = `I could not complete that request: ${error.message}`;
      } finally {
        send.disabled = false;
        question.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = question.value.trim();
      if (!text) return;
      question.value = "";
      question.style.height = "auto";
      ask(text);
    });
    question.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });
    question.addEventListener("input", () => {
      question.style.height = "auto";
      question.style.height = `${Math.min(question.scrollHeight, 140)}px`;
    });
  </script>
</body>
</html>
