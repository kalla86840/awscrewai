AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions OIDC role for deploying AWS MCP Ops real-time inference resources.

Parameters:
  ProjectName:
    Type: String
    Default: awsmcpops
  GitHubOwner:
    Type: String
    Default: kalla86840
  GitHubRepo:
    Type: String
    Default: awsmcpops
  GitHubBranch:
    Type: String
    Default: main
  ArtifactBucketName:
    Type: String
    Default: mlopswithsagemaker111
  OpenAIApiKeySecretArn:
    Type: String
    Default: arn:aws:secretsmanager:us-west-1:659613508664:secret:openai/api-key-6BGXhJ
  PineconeApiKeySecretArn:
    Type: String
    Default: arn:aws:secretsmanager:us-west-1:659613508664:secret:awspineconeapikey1-kiudra
  ExistingGitHubOidcProviderArn:
    Type: String
    Default: ""
    Description: Optional existing IAM OIDC provider ARN for https://token.actions.githubusercontent.com.

Conditions:
  CreateGitHubOidcProvider: !Equals [!Ref ExistingGitHubOidcProviderArn, ""]

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateGitHubOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-github-actions-deploy-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateGitHubOidcProvider
                - !Ref GitHubOidcProvider
                - !Ref ExistingGitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOwner}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}
      Policies:
        - PolicyName: !Sub ${ProjectName}-github-actions-deploy-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudFormationDeploy
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplateSummary
                  - cloudformation:UpdateStack
                  - cloudformation:ValidateTemplate
                Resource: "*"
              - Sid: LambdaEndpointDeploy
                Effect: Allow
                Action:
                  - lambda:AddPermission
                  - lambda:CreateFunction
                  - lambda:CreateFunctionUrlConfig
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:GetFunctionUrlConfig
                  - lambda:RemovePermission
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:UpdateFunctionUrlConfig
                Resource: !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-*
              - Sid: DeploymentArtifactBucket
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${ArtifactBucketName}
                  - !Sub arn:${AWS::Partition}:s3:::${ArtifactBucketName}/${ProjectName}/*
              - Sid: SecretsReadForEndpointDeploy
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref OpenAIApiKeySecretArn
                  - !Ref PineconeApiKeySecretArn
              - Sid: IamForCloudFormationManagedRoles
                Effect: Allow
                Action:
                  - iam:AttachRolePolicy
                  - iam:CreatePolicy
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:UpdateAssumeRolePolicy
                Resource:
                  - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-*
                  - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/${ProjectName}-*
              - Sid: PipelineStackOptionalDeploy
                Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:CreateProject
                  - codebuild:DeleteProject
                  - codebuild:StartBuild
                  - codebuild:UpdateProject
                  - codepipeline:CreatePipeline
                  - codepipeline:DeletePipeline
                  - codepipeline:GetPipeline
                  - codepipeline:GetPipelineState
                  - codepipeline:StartPipelineExecution
                  - codepipeline:UpdatePipeline
                  - codeconnections:UseConnection
                  - codestar-connections:UseConnection
                Resource: "*"
              - Sid: LogsForSmokeAndDeployDiagnostics
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                  - logs:PutLogEvents
                Resource: "*"

Outputs:
  GitHubActionsRoleArn:
    Description: Store this value as the GitHub repository secret AWS_ROLE_ARN.
    Value: !GetAtt GitHubActionsDeployRole.Arn
