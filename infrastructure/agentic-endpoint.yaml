AWSTemplateFormatVersion: "2010-09-09"
Description: CrewAI and OpenAI agentic hospital real-time inference Lambda endpoint.

Parameters:
  ProjectName:
    Type: String
    Default: aws-autogen-open-ai-pincone
  ImageUri:
    Type: String
    Description: ECR image URI for the packaged CrewAI Lambda container.
  OpenAIApiKeySecretArn:
    Type: String
    Description: Secrets Manager ARN containing the OpenAI API key.
  OpenAIModel:
    Type: String
    Default: gpt-5.2
  PineconeApiKeySecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN containing the Pinecone API key.
  PineconeIndexName:
    Type: String
    Default: agentic-hospital-rag-1024
  PineconeIndexHost:
    Type: String
    Default: ""
    Description: Optional Pinecone index host. Leave empty to use PineconeIndexName.
  PineconeNamespace:
    Type: String
    Default: hospital-agentic
  PineconeDimension:
    Type: Number
    Default: 1024
  PineconeCloud:
    Type: String
    Default: aws
  PineconeRegion:
    Type: String
    Default: us-east-1
  PineconeUpsertOnQuery:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  FunctionUrlAuthType:
    Type: String
    Default: NONE
    AllowedValues:
      - NONE
      - AWS_IAM
    Description: Use NONE for a directly callable real-time HTTPS endpoint, or AWS_IAM for signed requests.

Resources:
  AgenticFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-agentic-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${ProjectName}-agentic-lambda-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref OpenAIApiKeySecretArn
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref PineconeApiKeySecretArn

  AgenticFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-crewai-endpoint
      Role: !GetAtt AgenticFunctionRole.Arn
      PackageType: Image
      Timeout: 90
      MemorySize: 2048
      Code:
        ImageUri: !Ref ImageUri
      Environment:
        Variables:
          OPENAI_API_KEY_SECRET_ARN: !Ref OpenAIApiKeySecretArn
          OPENAI_MODEL: !Ref OpenAIModel
          MAX_OUTPUT_TOKENS: "1400"
          RAG_KNOWLEDGE_PATH: hospital_agentic_rag_knowledge.txt
          RAG_TOP_K: "4"
          PINECONE_API_KEY_SECRET_ARN: !Ref PineconeApiKeySecretArn
          PINECONE_INDEX_NAME: !Ref PineconeIndexName
          PINECONE_INDEX_HOST: !Ref PineconeIndexHost
          PINECONE_NAMESPACE: !Ref PineconeNamespace
          PINECONE_DIMENSION: !Ref PineconeDimension
          PINECONE_CLOUD: !Ref PineconeCloud
          PINECONE_REGION: !Ref PineconeRegion
          PINECONE_UPSERT_ON_QUERY: !Ref PineconeUpsertOnQuery
          OPENAI_EMBEDDING_MODEL: text-embedding-3-small

  AgenticFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref AgenticFunction
      AuthType: !Ref FunctionUrlAuthType
      Cors:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
        AllowHeaders:
          - content-type
          - authorization
          - x-amz-date
          - x-amz-security-token

  AgenticFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AgenticFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: !Ref FunctionUrlAuthType

Outputs:
  AgenticFunctionName:
    Value: !Ref AgenticFunction
  AgenticFunctionUrl:
    Value: !GetAtt AgenticFunctionUrl.FunctionUrl
