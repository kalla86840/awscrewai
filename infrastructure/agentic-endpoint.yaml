AWSTemplateFormatVersion: "2010-09-09"
Description: OpenAI agentic hospital real-time inference Lambda endpoint.

Parameters:
  ProjectName:
    Type: String
    Default: aws-open-ai-crewai
  ImageUri:
    Type: String
    Description: ECR image URI for the packaged CrewAI Lambda container.
  OpenAIApiKeySecretArn:
    Type: String
    Description: Secrets Manager ARN containing the OpenAI API key.
  OpenAIModel:
    Type: String
    Default: gpt-5.2
  FunctionUrlAuthType:
    Type: String
    Default: NONE
    AllowedValues:
      - NONE
      - AWS_IAM
    Description: Use NONE for a directly callable real-time HTTPS endpoint, or AWS_IAM for signed requests.

Resources:
  AgenticFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-agentic-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${ProjectName}-agentic-lambda-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref OpenAIApiKeySecretArn

  AgenticFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref ProjectName
      Role: !GetAtt AgenticFunctionRole.Arn
      PackageType: Image
      Timeout: 90
      MemorySize: 2048
      Code:
        ImageUri: !Ref ImageUri
      Environment:
        Variables:
          OPENAI_API_KEY_SECRET_ARN: !Ref OpenAIApiKeySecretArn
          OPENAI_MODEL: !Ref OpenAIModel
          MAX_OUTPUT_TOKENS: "1400"
          RAG_KNOWLEDGE_PATH: hospital_agentic_rag_knowledge.txt
          RAG_TOP_K: "4"

  AgenticFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref AgenticFunction
      AuthType: !Ref FunctionUrlAuthType
      Cors:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
        AllowHeaders:
          - content-type
          - authorization
          - x-amz-date
          - x-amz-security-token

  AgenticFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AgenticFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: !Ref FunctionUrlAuthType

Outputs:
  AgenticFunctionName:
    Value: !Ref AgenticFunction
  AgenticFunctionUrl:
    Value: !GetAtt AgenticFunctionUrl.FunctionUrl
