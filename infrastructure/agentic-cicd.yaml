AWSTemplateFormatVersion: "2010-09-09"
Description: AWS CodePipeline for the CrewAI and OpenAI agentic hospital real-time inference endpoint.

Parameters:
  ProjectName:
    Type: String
    Default: aws-autogen-open-ai-pincone
  ArtifactBucketName:
    Type: String
    Default: mlopswithsagemaker111
    Description: Existing S3 bucket used for CodePipeline artifacts and Lambda packages.
  CodeStarConnectionArn:
    Type: String
    Default: arn:aws:codeconnections:us-west-1:659613508664:connection/4ea8863c-728d-450a-8752-251946939b36
    Description: CodeConnections connection ARN for the GitHub repository.
  RepositoryId:
    Type: String
    Default: kalla86840/awscrewai
    Description: Repository identifier, for example owner/repository.
  BranchName:
    Type: String
    Default: main
  OpenAIApiKeySecretArn:
    Type: String
    Default: arn:aws:secretsmanager:us-west-1:659613508664:secret:openai/api-key-6BGXhJ
    Description: Secrets Manager ARN containing the OpenAI API key.
  OpenAIModel:
    Type: String
    Default: gpt-5.2
  PineconeApiKeySecretArn:
    Type: String
    Default: arn:aws:secretsmanager:us-west-1:659613508664:secret:awspineconeapikey1-kiudra
    Description: Optional Secrets Manager ARN containing the Pinecone API key.
  PineconeIndexName:
    Type: String
    Default: news-demo
  PineconeIndexHost:
    Type: String
    Default: ""
  PineconeNamespace:
    Type: String
    Default: hospital-agentic
  PineconeDimension:
    Type: Number
    Default: 1024
  PineconeCloud:
    Type: String
    Default: aws
  PineconeRegion:
    Type: String
    Default: us-east-1
  PineconeUpsertOnQuery:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  EcrRepositoryName:
    Type: String
    Default: aws-autogen-open-ai-pincone-crewai-endpoint

Conditions:
  HasPineconeSecret: !Not [!Equals [!Ref PineconeApiKeySecretArn, ""]]

Resources:
  AgenticEndpointRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref EcrRepositoryName
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep the latest 10 endpoint images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }

  AgenticCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-agentic-codebuild-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${ProjectName}-agentic-codebuild-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${ArtifactBucketName}
                  - !Sub arn:${AWS::Partition}:s3:::${ArtifactBucketName}/*
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplateSummary
                  - cloudformation:UpdateStack
                Resource: "*"
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:PassRole
                  - iam:PutRolePolicy
                Resource: "*"
              - Effect: Allow
                Action:
                  - lambda:AddPermission
                  - lambda:CreateFunction
                  - lambda:CreateFunctionUrlConfig
                  - lambda:DeleteFunction
                  - lambda:DeleteFunctionUrlConfig
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:GetFunctionUrlConfig
                  - lambda:InvokeFunction
                  - lambda:RemovePermission
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:UpdateFunctionUrlConfig
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:CompleteLayerUpload
                  - ecr:DescribeRepositories
                  - ecr:GetAuthorizationToken
                  - ecr:GetDownloadUrlForLayer
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref OpenAIApiKeySecretArn
              - !If
                - HasPineconeSecret
                - Effect: Allow
                  Action:
                    - secretsmanager:GetSecretValue
                  Resource: !Ref PineconeApiKeySecretArn
                - !Ref AWS::NoValue

  AgenticCodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-agentic-codepipeline-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${ProjectName}-agentic-codepipeline-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${ArtifactBucketName}
                  - !Sub arn:${AWS::Partition}:s3:::${ArtifactBucketName}/*
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                  - codeconnections:UseConnection
                Resource: !Ref CodeStarConnectionArn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: "*"

  AgenticDeployProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-agentic-deploy
      ServiceRole: !GetAtt AgenticCodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: ARTIFACT_BUCKET
            Value: !Ref ArtifactBucketName
          - Name: OPENAI_API_KEY_SECRET_ARN
            Value: !Ref OpenAIApiKeySecretArn
          - Name: OPENAI_MODEL
            Value: !Ref OpenAIModel
          - Name: PINECONE_API_KEY_SECRET_ARN
            Value: !Ref PineconeApiKeySecretArn
          - Name: PINECONE_INDEX_NAME
            Value: !Ref PineconeIndexName
          - Name: PINECONE_INDEX_HOST
            Value: !Ref PineconeIndexHost
          - Name: PINECONE_NAMESPACE
            Value: !Ref PineconeNamespace
          - Name: PINECONE_DIMENSION
            Value: !Ref PineconeDimension
          - Name: PINECONE_CLOUD
            Value: !Ref PineconeCloud
          - Name: PINECONE_REGION
            Value: !Ref PineconeRegion
          - Name: PINECONE_UPSERT_ON_QUERY
            Value: !Ref PineconeUpsertOnQuery
          - Name: ECR_REPOSITORY_URI
            Value: !GetAtt AgenticEndpointRepository.RepositoryUri
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec-agentic.yml
      TimeoutInMinutes: 30

  AgenticPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Ref ProjectName
      RoleArn: !GetAtt AgenticCodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucketName
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: !Ref CodeStarConnectionArn
                FullRepositoryId: !Ref RepositoryId
                BranchName: !Ref BranchName
              OutputArtifacts:
                - Name: SourceOutput
              RunOrder: 1
        - Name: DeployAgenticEndpoint
          Actions:
            - Name: PackageAndDeployLambda
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref AgenticDeployProject
              InputArtifacts:
                - Name: SourceOutput
              RunOrder: 1

Outputs:
  AgenticPipelineName:
    Value: !Ref AgenticPipeline
  AgenticDeployProjectName:
    Value: !Ref AgenticDeployProject
  AgenticEndpointRepositoryUri:
    Value: !GetAtt AgenticEndpointRepository.RepositoryUri
